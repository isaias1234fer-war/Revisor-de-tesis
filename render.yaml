services:
  - type: web
    name: thesis-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # Ingrese su URL de base de datos MySQL (ej: Aiven o Clever Cloud)
      - key: REDIS_URL
        fromService:
          type: redis
          name: thesis-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # Ingrese su clave OpenAI
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false

  - type: redis
    name: thesis-redis
    plan: free
    ipAllowList: [] # Permite únicamente conexiones internas seguras
